services:
  postgres:
    image: postgres:16
    container_name: customer-data-onboarding-postgres
    environment:
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
      POSTGRES_DB: onboarding
    ports:
      - "55432:5432"
    volumes:
      - onboarding_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onboarding -d onboarding"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onboarding_postgres_data:
